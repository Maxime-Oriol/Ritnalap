<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="orb" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#a8ddff"/>
      <stop offset="45%" stop-color="#4fb3ff"/>
      <stop offset="85%" stop-color="#0a3a6a"/>
      <stop offset="100%" stop-color="#05192e"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fb3ff"/>
      <stop offset="100%" stop-color="#1e5aa0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond transparent, halo -->
  <circle cx="128" cy="128" r="110" fill="#05192e" opacity="0.0"/>

  <!-- Orbe central (palantír) -->
  <g filter="url(#glow)">
    <circle cx="128" cy="128" r="72" fill="url(#orb)"/>
    <!-- Reflet -->
    <ellipse cx="108" cy="104" rx="22" ry="12" fill="#fff" opacity="0.35"/>
    <!-- Méridiens (globe) -->
    <ellipse cx="128" cy="128" rx="72" ry="30" fill="none" stroke="#a8ddff" stroke-width="1" opacity="0.35"/>
    <ellipse cx="128" cy="128" rx="30" ry="72" fill="none" stroke="#a8ddff" stroke-width="1" opacity="0.35"/>
    <line x1="56" y1="128" x2="200" y2="128" stroke="#a8ddff" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Anneau orbital 1 -->
  <ellipse cx="128" cy="128" rx="108" ry="36" fill="none"
           stroke="url(#ring)" stroke-width="2.5" opacity="0.8"
           transform="rotate(-20 128 128)"/>
  <!-- Satellite -->
  <g transform="rotate(-20 128 128)">
    <circle cx="236" cy="128" r="5" fill="#ffb347"/>
    <circle cx="236" cy="128" r="9" fill="none" stroke="#ffb347" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Anneau orbital 2 -->
  <ellipse cx="128" cy="128" rx="100" ry="28" fill="none"
           stroke="#7bff7b" stroke-width="1.5" opacity="0.55"
           transform="rotate(40 128 128)"/>
  <g transform="rotate(40 128 128)">
    <circle cx="28" cy="128" r="3.5" fill="#7bff7b"/>
  </g>

  <!-- Réticule / crosshair -->
  <g stroke="#4fb3ff" stroke-width="1.5" opacity="0.9" fill="none">
    <line x1="128" y1="18" x2="128" y2="38"/>
    <line x1="128" y1="218" x2="128" y2="238"/>
    <line x1="18" y1="128" x2="38" y2="128"/>
    <line x1="218" y1="128" x2="238" y2="128"/>
  </g>
</svg>
